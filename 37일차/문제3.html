<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
  <title>03_grid</title>
  <style>
    /* 아래의 코드는 수정이 필요 없습니다. */

@import url('https://fonts.googleapis.com/css?family=Baloo+2&display=swap');

body {
  font-family: 'Baloo 2', cursive;
  font-size: 1.2rem;
}

/* 1~3번 문제 */
h1 {
  text-align: center;
}

.container {
  margin-top: 3rem;
  margin-bottom: 3rem;
  border: 3px solid;
  border-radius: 0.3rem;
  background: #6fa4ed;
}

.container > .row {
  padding-top: 1.5rem;
  padding-bottom: 1.5rem;
}

.row {
  background: #edf5fc;
  border: 1px solid;
}

.item {
    text-align: center;
    padding-top: 1.5rem;
    padding-bottom: 1.5rem;
    color: white;
    border: 1px solid;
    border-radius: 8px;
    background: #1b365c;
}

.item > p {
  margin: 0;
}

  </style>
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="col">
        <h1>Bootstrap Grid System 3</h1>
      </div>
    </div>
    

    <!-- 3. -->
    <div class="row">
      <div class="item col-12 col-md-3">
        item1
      </div>
      <div class="item col-12 col-md-9">
        <div class="row">
          <div class="item col-6 col-lg-3">item2</div>
          <div class="item col-6 col-lg-3">item3</div>
          <div class="item col-6 col-lg-3">item4</div>
          <div class="item col-6 col-lg-3">item5</div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
    crossorigin="anonymous"></script>
</body>
</html>
