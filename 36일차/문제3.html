<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <style>
        .box {
            width: 500px;
            height: 700px;
            border: 2px solid white;
        }
        .small-box {
            width: 500px;
            height: 400px;
            border: 1px solid gray;
            border-radius: 10px;
        }
        
        .background-color-red {
            background-color: red;
            border-radius: 5px
            
        }
        .border-bottom-blue {
            border-bottom: 2px solid blue;
        }
        .border-bottom-gray {
            border-bottom: 1px solid gray;
        }
        .t-right {
            float: right;
        }
        .margin-top {
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="box col-2 mx-auto margin-bottom mt-2">
        <div>
            <p style="color:white" class="background-color-red">lnvalid Login or password</p>
        </div>
        <div>
            <p style="text-align: center;" class="border-bottom-gray"><strong>SSAFY 전용 Gitlab 시스템</strong></p>
        </div>
        <div class="small-box">
            <p style="text-align: center;" class=" border-bottom-blue">Sign in</p>
            <form>
                <div class="mb-3">
                  <label for="exampleInputEmail1" class="form-label"><strong>Username or Email</strong></label>
                  <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                </div>
                <div class="mb-3">
                  <label for="exampleInputPassword1" class="form-label"><strong>Password</strong></label>
                  <input type="password" class="form-control" id="exampleInputPassword1">
                </div>
                <div class="mb-3 form-check">
                  <input type="checkbox" class="form-check-input" id="exampleCheck1">
                  <label class="form-check-label" for="exampleCheck1">Remember me</label>
                  <button type="button" class="btn btn-link t-right">Forgot your password?</button>
                </div>
                <div class="d-grid col-8 mx-auto margin-bottom">
                    <button class="btn btn-success margin-top" type="button">Sign in</button>
                    
                </div>
                
              </form>
        </div>



    </div>
        



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
    crossorigin="anonymous"></script>
</body>
</html>
