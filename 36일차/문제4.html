<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <style>
        .cinema-logo {
            width: 100px;
            /* 이미지 컨테이너의 너비 */
            height: 30px;
            /* 이미지 컨테이너의 높이 */
            background-image: url(images/logo.png);
            /* 이미지 파일 경로를 지정합니다. */
            background-size: cover;
            /* 이미지를 컨테이너에 맞게 조절합니다. */
            background-repeat: no-repeat;
            /* 이미지 반복을 끕니다. */
        }

        .header-logo {
            width: 1920px;
            /* 이미지 컨테이너의 너비 */
            height: 540px;
            /* 이미지 컨테이너의 높이 */
            background-image: url(images/header.jpg);
            /* 이미지 파일 경로를 지정합니다. */
            background-size: cover;
            /* 이미지를 컨테이너에 맞게 조절합니다. */
            background-repeat: no-repeat;
            /* 이미지 반복을 끕니다. */
        }
        
        .web-logo {
            width: 640px;
            /* 이미지 컨테이너의 너비 */
            height: 640px;
            /* 이미지 컨테이너의 높이 */
            background-image: url(images/web.png);
            /* 이미지 파일 경로를 지정합니다. */
            background-size: cover;
            /* 이미지를 컨테이너에 맞게 조절합니다. */
            background-repeat: no-repeat;
            /* 이미지 반복을 끕니다. */
        }
        .css-logo {
            width: 640px;
            /* 이미지 컨테이너의 너비 */
            height: 640px;
            /* 이미지 컨테이너의 높이 */
            background-image: url(images/css3.png);
            /* 이미지 파일 경로를 지정합니다. */
            background-size: cover;
            /* 이미지를 컨테이너에 맞게 조절합니다. */
            background-repeat: no-repeat;
            /* 이미지 반복을 끕니다. */
            float: right;
        }
        .html-logo {
            width: 640px;
            /* 이미지 컨테이너의 너비 */
            height: 640px;
            /* 이미지 컨테이너의 높이 */
            background-image: url(images/html5.png);
            /* 이미지 파일 경로를 지정합니다. */
            background-size: cover;
            /* 이미지를 컨테이너에 맞게 조절합니다. */
            background-repeat: no-repeat;
            /* 이미지 반복을 끕니다. */
        }
        .image-container {
            display: flex; /* Flexbox를 사용하여 내부 요소를 가로로 나열합니다. */
            
        }

        .image-container img {
            margin-right: 10px; /* 이미지 사이의 간격을 조절합니다. */
        }
        /* 컨테이너 스타일 */
        .image-container1 {
            position: relative; /* 컨테이너를 상대 위치로 설정합니다. */
            text-align: center; /* 텍스트를 가운데 정렬합니다. */
            background-color: white;
        }

        /* 이미지 스타일 */
        .image-container1 img {
            width: 100%; /* 이미지를 컨테이너에 맞게 확대/축소합니다. */
            background-color: white;
        }
        
        /* 텍스트 스타일 */
        .image-text {
            position: absolute; /* 텍스트를 상대적으로 위치시킵니다. */
            top: 50%; /* 상단 여백을 50%로 설정합니다. */
            left: 0; /* 왼쪽 여백을 0으로 설정합니다. */
            right: 0; /* 오른쪽 여백을 0으로 설정합니다. */
            transform: translateY(-50%); /* 텍스트를 수직으로 가운데로 이동시킵니다. */
            color: white; /* 텍스트 색상을 설정합니다. */
            padding: 10px; /* 텍스트 주위에 여백을 추가합니다. */
            font-size: 50pt;
        }
        .button-container{
            position: absolute;
            top: 70%; /* 상단 여백을 50%로 설정합니다. */
            transform: translateY(-10%); /* 텍스트를 수직으로 가운데로 이동시킵니다. */
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
            <div class="cinema-logo"></div>

            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0"></ul>
                <span class="navbar-text">
                    <a class="navbar-brand" href="#">Home</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText"
                        aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <a class="navbar-brand" href="#">Comunity</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText"
                        aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <a class="navbar-brand" href="#">Login</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText"
                        aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                </span>
            </div>
        </div>
    </nav>
    <div class="image-container1">
        <div class="header-logo"></div>
        <div class="image-text"><strong>Cinema<br>Community</strong></div>
        <button type="button" class="btn btn-primary button-container">Let's Go</button>
    </div>
        <div>
            <p style="text-align: center; margin-top: 100px; font-size: xx-large;">Used Skills</p>
        </div>
        <div class="image-container">
            <div class="web-logo"></div>
            <div class="html-logo"></div>
            <div class="css-logo"></div>     
        </div>
    
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
        crossorigin="anonymous"></script>
</body>

</html>
