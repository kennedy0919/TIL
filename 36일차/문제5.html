<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
        <style>
            .web-logo {
            width: 640px;
            /* 이미지 컨테이너의 너비 */
            height: 640px;
            /* 이미지 컨테이너의 높이 */
            background-image: url(images/web.png);
            /* 이미지 파일 경로를 지정합니다. */
            background-size: cover;
            /* 이미지를 컨테이너에 맞게 조절합니다. */
            background-repeat: no-repeat;
            /* 이미지 반복을 끕니다. */
        }
        .css-logo {
            width: 640px;
            /* 이미지 컨테이너의 너비 */
            height: 640px;
            /* 이미지 컨테이너의 높이 */
            background-image: url(images/css3.png);
            /* 이미지 파일 경로를 지정합니다. */
            background-size: cover;
            /* 이미지를 컨테이너에 맞게 조절합니다. */
            background-repeat: no-repeat;
            /* 이미지 반복을 끕니다. */
            float: right;
        }
        .html-logo {
            width: 640px;
            /* 이미지 컨테이너의 너비 */
            height: 640px;
            /* 이미지 컨테이너의 높이 */
            background-image: url(images/html5.png);
            /* 이미지 파일 경로를 지정합니다. */
            background-size: cover;
            /* 이미지를 컨테이너에 맞게 조절합니다. */
            background-repeat: no-repeat;
            /* 이미지 반복을 끕니다. */
        }
        .image-container {
            display: flex; /* Flexbox를 사용하여 내부 요소를 가로로 나열합니다. */
            
        }

        .image-container img {
            margin-right: 10px; /* 이미지 사이의 간격을 조절합니다. */
        }
        </style>
</head>
<body>
    <div>
        <div>
            <p style="text-align: center; margin-top: 100px; font-size: xx-large;">Used Skills</p>
        </div>
        <div class="image-container">
            <div class="web-logo"></div>
            <div class="html-logo"></div>
            <div class="css-logo"></div>     
        </div>
    </div>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
        crossorigin="anonymous"></script>
    <div style="background-color: blue; font-size: 35;" class="alert alert-dark" role="alert">
        A simple dark alert—check it out!
        </div>
</body>
</html>
